services:

  jenkins:
    build:
      context: .
      dockerfile: Dockerfile.jenkins
    restart: always
    ports:
      - "8082:8080"
      - "50000:50000"
    environment:
      JENKINS_OPTS: "--httpPort=8080"
    volumes:
      - jenkins_home:/var/jenkins_home
      - /var/run/docker.sock:/var/run/docker.sock
      - ./:/workspace

  zookeeper:
    image: confluentinc/cp-zookeeper:7.6.0
    hostname: zookeeper
    ports:
      - "2181:2181"
    environment:
      ZOOKEEPER_CLIENT_PORT: 2181
      ZOOKEEPER_TICK_TIME: 2000

  kafka:
    image: confluentinc/cp-kafka:7.6.0
    hostname: kafka
    depends_on:
      - zookeeper
    ports:
      - "9092:9092"
    environment:
      KAFKA_BROKER_ID: 1
      KAFKA_ZOOKEEPER_CONNECT: "zookeeper:2181"
      KAFKA_LISTENERS: "PLAINTEXT://0.0.0.0:9092"
      KAFKA_ADVERTISED_LISTENERS: "PLAINTEXT://kafka:9092"
      KAFKA_OFFSETS_TOPIC_REPLICATION_FACTOR: 1
      KAFKA_AUTO_CREATE_TOPICS_ENABLE: "true"

  postgres:
    image: postgres:15
    restart: always
    ports:
      - "5432:5432"
    environment:
      POSTGRES_USER: ${POSTGRES_USER:-airflow}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-airflow}
      POSTGRES_DB: ${POSTGRES_DB:-airflow}
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U airflow -d airflow"]
      interval: 10s
      timeout: 5s
      retries: 10
      start_period: 10s

  airflow-webserver:
    build:
      context: .
      dockerfile: Dockerfile.airflow
    depends_on:
      - postgres
    ports:
      - "8080:8080"
    environment:
      AIRFLOW__CORE__EXECUTOR: LocalExecutor
      AIRFLOW__DATABASE__SQL_ALCHEMY_CONN: postgresql+psycopg2://${POSTGRES_USER:-airflow}:${POSTGRES_PASSWORD:-airflow}@postgres/${POSTGRES_DB:-airflow}
      AIRFLOW__CORE__FERNET_KEY: ${AIRFLOW_FERNET_KEY:-egkwLUYtHNJMar3Wl68aE7qFa5L_Ir_Y9TosRdNTkR0=}
      AIRFLOW__WEBSERVER__SECRET_KEY: ${AIRFLOW_WEBSERVER_SECRET_KEY:-propensity_pipeline_shared_secret_key_2026}
      AIRFLOW__LOGGING__BASE_LOG_FOLDER: /opt/airflow/logs
      AIRFLOW__CORE__LOAD_EXAMPLES: "false"
      AIRFLOW__CORE__DAGS_FOLDER: /opt/airflow/dags
      PROJECT_ROOT: /opt/airflow/project
      DATA_ROOT: /data
      DB_HOST: postgres
      DB_USER: ${POSTGRES_USER:-airflow}
      DB_PASS: ${POSTGRES_PASSWORD:-airflow}
      DB_NAME: ${POSTGRES_DB:-airflow}
      KAFKA_BOOTSTRAP_SERVERS: ${KAFKA_BOOTSTRAP_SERVERS:-kafka:9092}
      BROADCAST_TOPIC: ${BROADCAST_TOPIC:-propensity_scores.broadcast}
      STREAMLIT_HEALTH_URLS: ${STREAMLIT_HEALTH_URLS:-http://streamlit:8501/healthz,http://localhost:8501/healthz}
    volumes:
      - ./Airflow/dags:/opt/airflow/dags
      - ./Airflow/logs:/opt/airflow/logs
      - ./:/opt/airflow/project
      - ./data:/data
    command: >
      bash -c "airflow db upgrade && airflow webserver"

  airflow-scheduler:
    build:
      context: .
      dockerfile: Dockerfile.airflow
    depends_on:
      - postgres
    environment:
      AIRFLOW__CORE__EXECUTOR: LocalExecutor
      AIRFLOW__DATABASE__SQL_ALCHEMY_CONN: postgresql+psycopg2://${POSTGRES_USER:-airflow}:${POSTGRES_PASSWORD:-airflow}@postgres/${POSTGRES_DB:-airflow}
      AIRFLOW__CORE__FERNET_KEY: ${AIRFLOW_FERNET_KEY:-egkwLUYtHNJMar3Wl68aE7qFa5L_Ir_Y9TosRdNTkR0=}
      AIRFLOW__WEBSERVER__SECRET_KEY: ${AIRFLOW_WEBSERVER_SECRET_KEY:-propensity_pipeline_shared_secret_key_2026}
      AIRFLOW__LOGGING__BASE_LOG_FOLDER: /opt/airflow/logs
      AIRFLOW__CORE__LOAD_EXAMPLES: "false"
      AIRFLOW__CORE__DAGS_FOLDER: /opt/airflow/dags
      PROJECT_ROOT: /opt/airflow/project
      DATA_ROOT: /data
      DB_HOST: postgres
      DB_USER: ${POSTGRES_USER:-airflow}
      DB_PASS: ${POSTGRES_PASSWORD:-airflow}
      DB_NAME: ${POSTGRES_DB:-airflow}
      KAFKA_BOOTSTRAP_SERVERS: ${KAFKA_BOOTSTRAP_SERVERS:-kafka:9092}
      BROADCAST_TOPIC: ${BROADCAST_TOPIC:-propensity_scores.broadcast}
      STREAMLIT_HEALTH_URLS: ${STREAMLIT_HEALTH_URLS:-http://streamlit:8501/healthz,http://localhost:8501/healthz}
    volumes:
      - ./Airflow/dags:/opt/airflow/dags
      - ./Airflow/logs:/opt/airflow/logs
      - ./:/opt/airflow/project
      - ./data:/data
    command: scheduler

  flink-jobmanager:
    image: flink:1.18.1-scala_2.12
    container_name: flink-jobmanager
    ports:
      - "8081:8081"
    command: jobmanager
    environment:
      - JOB_MANAGER_RPC_ADDRESS=flink-jobmanager

  flink-taskmanager:
    image: flink:1.18.1-scala_2.12
    container_name: flink-taskmanager
    depends_on:
      - flink-jobmanager
    command: taskmanager
    environment:
      - JOB_MANAGER_RPC_ADDRESS=flink-jobmanager

  streamlit:
    build:
      context: .
      dockerfile: Dockerfile
    depends_on:
      kafka:
        condition: service_started
      postgres:
        condition: service_healthy
    ports:
      - "8501:8501"
    environment:
      KAFKA_BOOTSTRAP_SERVERS: kafka:9092
      DB_HOST: postgres
      DB_USER: airflow
      DB_PASS: airflow
      DB_NAME: airflow
    volumes:
      - ./:/app
    working_dir: /app
    command: python -m streamlit run Streamlit/app.py --server.port 8501 --server.enableCORS false

  producer:
    build:
      context: .
      dockerfile: Dockerfile
    depends_on:
      - kafka
    environment:
      KAFKA_BOOTSTRAP_SERVERS: kafka:9092
      TRANSACTION_TOPIC: txn.stream
      PRODUCT_EVENT_TOPIC: product.events
      SCENARIO_SHARE: 0.95
      SCENARIO_CUSTOMERS_PER_PRODUCT: 16
      SCENARIO_PRODUCT_WEIGHTS: home_loan=0.10,credit_card=0.70,personal_loan=0.10,fixed_deposit=0.10
    volumes:
      - ./:/app
    working_dir: /app
    command: python Streaming/producer.py

  broadcast_publisher:
    build:
      context: .
      dockerfile: Dockerfile
    depends_on:
      - kafka
      - postgres
    environment:
      KAFKA_BOOTSTRAP_SERVERS: kafka:9092
      BROADCAST_TOPIC: propensity_scores.broadcast
      DB_HOST: postgres
      DB_USER: airflow
      DB_PASS: airflow
      DB_NAME: airflow
    volumes:
      - ./:/app
    working_dir: /app
    command: python Streaming/broadcast_publisher.py

  crm_consumer:
    build:
      context: .
      dockerfile: Dockerfile
    depends_on:
      - kafka
    environment:
      KAFKA_BOOTSTRAP_SERVERS: kafka:9092
    volumes:
      - ./:/app
    working_dir: /app
    command: python Streaming/consumer.py --topic crm.realtime_offers

  realtime_offer_writer:
    build:
      context: .
      dockerfile: Dockerfile
    depends_on:
      - kafka
      - postgres
    environment:
      KAFKA_BOOTSTRAP_SERVERS: kafka:9092
      OFFER_TOPIC: crm.realtime_offers
      DB_HOST: postgres
      DB_USER: airflow
      DB_PASS: airflow
      DB_NAME: airflow
    volumes:
      - ./:/app
    working_dir: /app
    command: python Streaming/offer_writer.py

  intent_detector:
    build:
      context: .
      dockerfile: Dockerfile.flink
    depends_on:
      - flink-jobmanager
      - kafka
      - postgres
    volumes:
      - ./:/app
    working_dir: /app
    environment:
      KAFKA_BOOTSTRAP_SERVERS: kafka:9092
      TRANSACTION_TOPIC: txn.stream
      PRODUCT_EVENT_TOPIC: product.events
      BROADCAST_TOPIC: propensity_scores.broadcast
      OFFER_TOPIC: crm.realtime_offers
      INTENT_DETECTOR_PARALLELISM: 16
      REALTIME_OFFER_THRESHOLD: 75
      DB_HOST: postgres
      DB_USER: airflow
      DB_PASS: airflow
      DB_NAME: airflow
      FLINK_HOME: /opt/flink
    command: bash Flinkjobs/start_intent_detector.sh
  spark-job:
    image: apache/spark:3.5.1
    container_name: spark-job
    depends_on:
      - postgres
    volumes:
      - ./data:/data
      - ./Batch:/app
    working_dir: /app
    environment:
      - PYSPARK_PYTHON=python3
      - PYSPARK_DRIVER_PYTHON=python3
    command: tail -f /dev/null  

volumes:
  postgres_data:
  shared_data:
  jenkins_home: